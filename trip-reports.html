---
layout: page
title: Trip Reports
permalink: /trip-reports/
---


<div class="posts">
  {% for post in site.trip-reports | sort: "date" %}
    <article class="trip-report">

      <h1><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h1>

      <div class="entry">
        {{ post.excerpt }}
      </div>

      <a href="{{ site.baseurl }}{{ post.url }}" class="read-more">Read More</a>
    </article>
  {% endfor %}
</div>
