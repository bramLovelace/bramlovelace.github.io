---
layout: page
title: Trip Reports
permalink: /trip-reports/
---


<div class="posts">
  {% assign sorted_posts = site.trip-reports | sort: "date" | reverse %}
  {% for post in sorted_posts %}  
    <article class="trip-report">

      <h1><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h1>

      <div class="entry">
        {{ post.excerpt }}
      </div>

      <a href="{{ site.baseurl }}{{ post.url }}" class="read-more">Read More</a> — {{ post.date | date: "%B %d, %Y" }}
    </article>
  {% endfor %}
</div>
